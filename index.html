<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TibiaZone - Manager Pro</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #1a1a1a;
            --border-color: #3d3d3d;
            --accent-gold: #b9935a;
            --text-main: #e0d0b0;
            --text-muted: #888;
            --danger: #a83232;
            --success: #4a8a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- LOGIN OVERLAY --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--panel-bg);
            padding: 2rem;
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 20px rgba(185, 147, 90, 0.2);
        }

        /* --- MAIN APP LAYOUT --- */
        #app-content {
            display: none;
            width: 95%;
            max-width: 1200px;
            margin: 20px auto;
        }

        header {
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .card-header {
            color: var(--accent-gold);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 15px;
            border-left: 3px solid var(--accent-gold);
            padding-left: 10px;
        }

        /* --- FORMS & INPUTS --- */
        input, select, button {
            background: #252525;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            margin: 5px 0;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        button {
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-gold {
            background: var(--accent-gold);
            color: black;
        }

        .btn-gold:hover { background: #d4ae75; }

        /* --- TABLES --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #222;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 900px) {
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--accent-gold)">TIBIAZONE ACCESS</h2>
            <p style="color: var(--text-muted)">Insira a chave de acesso do DreamTeam</p>
            <input type="password" id="pass-input" placeholder="Senha aqui...">
            <br><br>
            <button class="btn-gold" onclick="checkPass()" style="width: 100%">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="app-content">
        <header>
            <h1>TibiaZone <span style="font-weight: lighter; color: var(--text-muted)">| Manager</span></h1>
            <button onclick="logout()" style="background: transparent; border: none; color: var(--danger); cursor: pointer">Sair</button>
        </header>

        <div class="grid-container">
            <main>
                <div class="card">
                    <div class="card-header">Registrar Nova Run</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                        <input type="text" id="run-name" placeholder="Nome da Run (Ex: Soul War)">
                        <input type="number" id="run-scrolls" placeholder="Scrolls Dropados">
                        <button class="btn-gold" onclick="addRun()">ADICIONAR</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Histórico de Atividades</div>
                    <table id="run-table">
                        <thead>
                            <tr>
                                <th>DATA</th>
                                <th>NOME</th>
                                <th>SCROLLS</th>
                                <th>STACKS</th>
                                <th>AÇÃO</th>
                            </tr>
                        </thead>
                        <tbody id="run-list"></tbody>
                    </table>
                </div>
            </main>

            <aside>
                <div class="card">
                    <div class="card-header">Gestão de Players</div>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="player-name" placeholder="Novo Player..." style="flex: 1">
                        <button class="btn-gold" onclick="addPlayer()">+</button>
                    </div>
                    <div id="player-chips" style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 5px;"></div>
                </div>

                <div class="card" style="border-color: #444;">
                    <div class="card-header">Resumo de Stacks</div>
                    <div id="stack-summary">
                        </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DE ACESSO ---
        const SENHAS = ["dreamteam2026", "tibia123"];

        let runs = JSON.parse(localStorage.getItem('tz_runs')) || [];
        let players = JSON.parse(localStorage.getItem('tz_players')) || [];

        function checkPass() {
            const input = document.getElementById('pass-input').value;
            if (SENHAS.includes(input)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                renderAll();
            } else {
                alert("Senha incorreta, guerreiro!");
            }
        }

        function logout() {
            location.reload();
        }

        // --- LÓGICA DE DADOS ---
        function addRun() {
            const name = document.getElementById('run-name').value;
            const scrolls = document.getElementById('run-scrolls').value;

            if(!name || !scrolls) return alert("Preencha tudo!");

            const newRun = {
                id: Date.now(),
                date: new Date().toLocaleDateString('pt-BR'),
                name: name,
                scrolls: parseInt(scrolls),
                stacks: (parseInt(scrolls) / 10).toFixed(1) // Exemplo de cálculo
            };

            runs.push(newRun);
            save();
            renderAll();
            document.getElementById('run-name').value = '';
            document.getElementById('run-scrolls').value = '';
        }

        function addPlayer() {
            const pName = document.getElementById('player-name').value;
            if(pName && !players.includes(pName)) {
                players.push(pName);
                save();
                renderAll();
                document.getElementById('player-name').value = '';
            }
        }

        function removeRun(id) {
            runs = runs.filter(r => r.id !== id);
            save();
            renderAll();
        }

        function removePlayer(name) {
            players = players.filter(p => p !== name);
            save();
            renderAll();
        }

        function save() {
            localStorage.setItem('tz_runs', JSON.stringify(runs));
            localStorage.setItem('tz_players', JSON.stringify(players));
        }

        // --- RENDERIZAÇÃO ---
        function renderAll() {
            // Render Runs
            const list = document.getElementById('run-list');
            list.innerHTML = runs.map(r => `
                <tr>
                    <td>${r.date}</td>
                    <td>${r.name}</td>
                    <td>${r.scrolls}</td>
                    <td style="color: var(--accent-gold)">${r.stacks}</td>
                    <td><button onclick="removeRun(${r.id})" style="color: var(--danger); border: none; background: none;">[x]</button></td>
                </tr>
            `).join('');

            // Render Players
            const pDiv = document.getElementById('player-chips');
            pDiv.innerHTML = players.map(p => `
                <span style="background: #333; padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; border: 1px solid #444">
                    ${p} <span onclick="removePlayer('${p}')" style="cursor:pointer; margin-left:5px; color: var(--danger)">×</span>
                </span>
            `).join('');

            // Resumo de Stacks
            const totalScrolls = runs.reduce((acc, curr) => acc + curr.scrolls, 0);
            document.getElementById('stack-summary').innerHTML = `
                <div style="font-size: 1.5rem; color: var(--accent-gold)">${(totalScrolls / 10).toFixed(1)} <small style="font-size: 0.8rem; color: var(--text-muted)">Stacks Totais</small></div>
                <div style="margin-top: 10px; color: var(--text-muted)">Total de Scrolls: ${totalScrolls}</div>
            `;
        }
    </script>
</body>
</html>
