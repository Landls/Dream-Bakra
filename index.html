<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Team · Boss Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0b08;
    --bg2:       #13110d;
    --bg3:       #1a1610;
    --border:    #2e2618;
    --gold:      #c9a84c;
    --gold-dim:  #7a6228;
    --gold-glow: #e8c96a;
    --red:       #b84040;
    --text:      #d4c9a8;
    --text-dim:  #7a7260;
    --white:     #f0e8d0;
    --radius:    4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(201,168,76,.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(184,64,64,.03) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #18140d 0%, var(--bg) 100%);
    z-index: 100;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--gold);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }

  .logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .logo span {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-left: 2px;
  }

  /* admin trigger — invisible corner */
  #admin-trigger {
    position: absolute; top: 0; right: 0;
    width: 40px; height: 40px;
    cursor: pointer; opacity: 0;
    z-index: 200;
  }

  /* ── NAV ── */
  nav {
    display: flex; align-items: center; gap: 0;
    padding: 0 32px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 90;
  }

  nav button {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none; border: none;
    padding: 14px 20px;
    cursor: pointer;
    position: relative;
    transition: color .2s;
  }

  nav button::after {
    content: '';
    position: absolute; bottom: 0; left: 16px; right: 16px;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform .2s;
  }

  nav button.active { color: var(--gold); }
  nav button.active::after { transform: scaleX(1); }
  nav button:hover { color: var(--text); }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    min-height: calc(100vh - 105px);
    position: relative; z-index: 1;
  }

  /* ── MAIN PANEL ── */
  .main-panel {
    padding: 32px;
    border-right: 1px solid var(--border);
  }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-dim);
  }

  /* ── TABLE ── */
  .boss-table {
    width: 100%;
    border-collapse: collapse;
  }

  .boss-table th {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .boss-table td {
    padding: 10px 12px;
    font-size: 14px;
    color: var(--text-dim);
    border-bottom: 1px solid rgba(46,38,24,.6);
    vertical-align: middle;
  }

  .boss-table tr:hover td { background: rgba(201,168,76,.03); }

  .boss-table td.date { font-size: 12px; white-space: nowrap; }
  .boss-table td.boss-name { color: var(--text); font-weight: 400; }

  .loot-tag {
    display: inline-block;
    color: var(--gold);
    font-size: 13px;
    font-style: italic;
    line-height: 1.3;
  }

  .loot-line { display: block; }

  .points-cell {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
  }

  .pts-20 { color: var(--gold-glow); }
  .pts-13 { color: var(--gold); }
  .pts-9  { color: #b8a060; }
  .pts-5  { color: #8a7840; }
  .pts-3  { color: #6a5c30; }

  .empty-cell { color: var(--border); font-size: 12px; text-align: center; }

  /* ── SIDE PANEL ── */
  .side-panel {
    padding: 24px;
    background: var(--bg2);
  }

  .side-tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .side-tab {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none; border: none;
    padding: 10px 14px;
    cursor: pointer;
    position: relative;
    transition: color .2s;
  }

  .side-tab::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 1px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform .2s;
  }

  .side-tab.active { color: var(--gold); }
  .side-tab.active::after { transform: scaleX(1); }

  /* ── STACKS LIST ── */
  .player-row {
    display: flex; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(46,38,24,.5);
    gap: 10px;
  }

  .player-rank {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--gold-dim);
    width: 16px;
    text-align: center;
  }

  .player-name { flex: 1; font-size: 15px; color: var(--text); }

  .player-pts {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    min-width: 32px;
    text-align: right;
  }

  /* ── LOOT LIST ── */
  .loot-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(46,38,24,.5);
  }

  .loot-item-name {
    font-size: 14px;
    color: var(--gold);
    font-style: italic;
  }

  .loot-item-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── PLAYERS LIST ── */
  .player-badge {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(46,38,24,.5);
  }

  .player-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold-dim);
  }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: all .2s;
    border-radius: var(--radius);
  }

  .btn:hover {
    background: rgba(201,168,76,.1);
    border-color: var(--gold);
  }

  .btn-primary {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
  }

  .btn-primary:hover {
    background: var(--gold-glow);
    border-color: var(--gold-glow);
  }

  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: rgba(184,64,64,.1); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 1000;
    align-items: center; justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold-dim);
    width: 520px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
    border-radius: var(--radius);
    position: relative;
    animation: slideUp .25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
  }

  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer;
    line-height: 1; padding: 4px;
  }

  .modal-close:hover { color: var(--text); }

  /* ── FORM ── */
  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    padding: 10px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold-dim);
  }

  select option { background: var(--bg3); }

  textarea { resize: vertical; min-height: 80px; }

  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; }

  /* loot entries */
  .loot-entries { margin-bottom: 12px; }

  .loot-entry {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
  }

  .loot-entry input { background: transparent; border: none; padding: 4px 0; flex: 1; }
  .loot-entry select { background: transparent; border: none; padding: 4px; width: auto; }
  .loot-entry input:focus, .loot-entry select:focus { border: none; box-shadow: none; }

  .remove-loot {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; line-height: 1;
    padding: 2px 4px;
  }

  .remove-loot:hover { color: var(--red); }

  .add-loot-btn {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    background: none; border: 1px dashed var(--border);
    width: 100%; padding: 8px;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all .2s;
  }

  .add-loot-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* player checkboxes */
  .player-checks {
    display: flex; flex-wrap: wrap; gap: 8px;
  }

  .check-label {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Crimson Pro', serif;
    font-style: normal;
    color: var(--text);
    letter-spacing: 0;
    text-transform: none;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: all .2s;
  }

  .check-label:has(input:checked) {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,.08);
    color: var(--gold);
  }

  .check-label input { display: none; }

  /* modal actions */
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* ── ADMIN PANEL ── */
  #admin-panel {
    display: none;
    position: fixed; top: 64px; right: 0;
    width: 280px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold-dim);
    padding: 20px;
    z-index: 500;
    box-shadow: -8px 8px 32px rgba(0,0,0,.5);
  }

  #admin-panel.open { display: block; }

  .admin-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .admin-section { margin-bottom: 16px; }

  .admin-section-title {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .admin-players-list { display: flex; flex-direction: column; gap: 6px; }

  .admin-player-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px;
    background: var(--bg3);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  .admin-player-name { font-size: 13px; color: var(--text); }

  /* ── AUTH MODAL ── */
  #auth-modal .modal { max-width: 340px; }

  .auth-error {
    color: var(--red); font-size: 13px; margin-top: 8px; display: none;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding: 48px 0;
    text-align: center;
    color: var(--text-dim);
    font-style: italic;
    font-size: 14px;
  }

  /* ── DIVIDER ── */
  .ornament {
    text-align: center;
    color: var(--gold-dim);
    font-size: 18px;
    letter-spacing: 8px;
    margin: 4px 0;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg3);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: var(--radius);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 9999;
  }

  #toast.show { opacity: 1; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .side-panel { border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div>
      <h1>Dream Team</h1>
      <span>Tracker</span>
    </div>
  </div>
  <div id="admin-trigger" title="Admin" onclick="openAuth()"></div>
</header>

<!-- ── NAV ── -->
<nav>
  <button class="active" onclick="setView('tracker',this)">⚔ Boss Tracker</button>
</nav>

<!-- ── ADMIN PANEL ── -->
<div id="admin-panel">
  <div class="admin-title">⚙ Painel Admin</div>

  <div class="admin-section">
    <div class="admin-section-title">Jogadores</div>
    <div class="admin-players-list" id="admin-players-list"></div>
    <div style="margin-top:8px">
      <div class="field-row" style="margin-bottom:0">
        <input id="new-player-input" placeholder="Nome do jogador…" style="flex:1">
        <button class="btn btn-primary" onclick="addPlayer()" style="white-space:nowrap">+</button>
      </div>
    </div>
  </div>

  <div class="admin-section">
    <div class="admin-section-title">Ações</div>
    <div style="display:flex; gap:8px; flex-direction:column">
      <button class="btn btn-danger" onclick="clearAllData()" style="width:100%;font-size:9px">Limpar todos os dados</button>
      <button class="btn" onclick="closeAdmin()" style="width:100%;font-size:9px">Fechar painel</button>
    </div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div class="app">

  <!-- Left: Boss Table -->
  <div class="main-panel">
    <div class="panel-header">
      <div class="panel-title">⚔ Bosses</div>
      <button class="btn btn-primary" id="add-boss-btn" onclick="openBossModal()" style="display:none">+ Registrar Boss</button>
    </div>

    <table class="boss-table" id="boss-table">
      <thead>
        <tr>
          <th>Data</th>
          <th>Boss</th>
          <th>Loot Obtido</th>
          <th style="text-align:center">3pts</th>
          <th style="text-align:center">5pts</th>
          <th style="text-align:center">9pts</th>
          <th style="text-align:center">13pts</th>
          <th style="text-align:center">20pts</th>
          <th id="actions-col" style="display:none">Ações</th>
        </tr>
      </thead>
      <tbody id="boss-tbody"></tbody>
    </table>

    <div id="boss-empty" class="empty-state" style="display:none">
      Nenhum boss registrado ainda.<br>
      <span style="font-size:12px; color: var(--border)">Entre como admin para adicionar.</span>
    </div>
  </div>

  <!-- Right: Side Panel -->
  <div class="side-panel">
    <div class="side-tabs">
      <button class="side-tab active" onclick="setSideTab('stacks',this)">Stacks</button>
      <button class="side-tab" onclick="setSideTab('loot',this)">Loot</button>
      <button class="side-tab" onclick="setSideTab('players',this)">Players</button>
    </div>

    <div id="tab-stacks">
      <div id="stacks-list"></div>
    </div>

    <div id="tab-loot" style="display:none">
      <div id="loot-list"></div>
    </div>

    <div id="tab-players" style="display:none">
      <div id="players-list"></div>
    </div>
  </div>
</div>

<!-- ── AUTH MODAL ── -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('auth-modal')">×</button>
    <div class="modal-title">🔐 Acesso Admin</div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAuth()">
      <div class="auth-error" id="auth-error">Senha incorreta.</div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('auth-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="checkAuth()">Entrar</button>
    </div>
  </div>
</div>

<!-- ── BOSS MODAL ── -->
<div class="modal-overlay" id="boss-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('boss-modal')">×</button>
    <div class="modal-title" id="boss-modal-title">⚔ Registrar Boss</div>

    <input type="hidden" id="edit-boss-id">

    <div class="field-row">
      <div class="field">
        <label>Data</label>
        <input type="date" id="boss-date">
      </div>
      <div class="field" style="flex:2">
        <label>Nome do Boss</label>
        <input type="text" id="boss-name" placeholder="ex: 4 Ess – Boss 22">
      </div>
    </div>

    <div class="field">
      <label>Jogadores presentes</label>
      <div class="player-checks" id="player-checks"></div>
    </div>

    <div class="field">
      <label>Loot obtido <span style="font-weight:300;text-transform:none;letter-spacing:0;color:var(--text-dim)">(adicione quantos quiser)</span></label>
      <div class="loot-entries" id="loot-entries"></div>
      <button class="add-loot-btn" onclick="addLootEntry()">+ Adicionar item</button>
    </div>

    <div class="field">
      <label>Pontuação especial (opcional)</label>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;font-family:'Crimson Pro';font-style:italic">
        Atribua pontos especiais a jogadores além do loot normal.
      </div>
      <div id="special-pts-area"></div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal('boss-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveBoss()">Salvar</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
// ────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────
const ADMIN_PASS = 'dreamteam';
const LS_KEY = 'dreamteam_v2';

let state = {
  bosses:  [],   // { id, date, name, loot:[{item,player}], players:[], specialPts:{playerName:pts} }
  players: [],   // [{id, name}]
};

let isAdmin = false;
let currentSideTab = 'stacks';
let editingBossId = null;

// ────────────────────────────────────────────
// PERSISTENCE
// ────────────────────────────────────────────
function save() {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) { state = { bosses:[], players:[] }; }
}

// ────────────────────────────────────────────
// AUTH
// ────────────────────────────────────────────
function openAuth() {
  if (isAdmin) { toggleAdmin(); return; }
  document.getElementById('auth-password').value = '';
  document.getElementById('auth-error').style.display = 'none';
  openModal('auth-modal');
  setTimeout(() => document.getElementById('auth-password').focus(), 100);
}

function checkAuth() {
  const pw = document.getElementById('auth-password').value;
  if (pw === ADMIN_PASS) {
    isAdmin = true;
    closeModal('auth-modal');
    showAdminUI();
    toast('Bem-vindo, Admin');
  } else {
    document.getElementById('auth-error').style.display = 'block';
  }
}

function showAdminUI() {
  document.getElementById('add-boss-btn').style.display = '';
  document.getElementById('actions-col').style.display = '';
  document.querySelectorAll('.action-cell').forEach(c => c.style.display = '');
  renderAdmin();
  toggleAdmin();
}

function toggleAdmin() {
  document.getElementById('admin-panel').classList.toggle('open');
}

function closeAdmin() {
  document.getElementById('admin-panel').classList.remove('open');
}

// ────────────────────────────────────────────
// PLAYERS (ADMIN)
// ────────────────────────────────────────────
function addPlayer() {
  const input = document.getElementById('new-player-input');
  const name = input.value.trim();
  if (!name) return;
  state.players.push({ id: uid(), name });
  input.value = '';
  save();
  renderAll();
}

function removePlayer(id) {
  if (!confirm('Remover este jogador?')) return;
  state.players = state.players.filter(p => p.id !== id);
  save();
  renderAll();
}

function renderAdmin() {
  const list = document.getElementById('admin-players-list');
  if (!state.players.length) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;font-style:italic">Nenhum jogador ainda.</div>';
    return;
  }
  list.innerHTML = state.players.map(p => `
    <div class="admin-player-row">
      <span class="admin-player-name">${esc(p.name)}</span>
      <button class="btn btn-danger" style="padding:3px 8px;font-size:8px" onclick="removePlayer('${p.id}')">×</button>
    </div>
  `).join('');
}

// ────────────────────────────────────────────
// BOSS MODAL
// ────────────────────────────────────────────
function openBossModal(bossId = null) {
  editingBossId = bossId;
  const title = document.getElementById('boss-modal-title');

  // Player checkboxes
  const checks = document.getElementById('player-checks');
  checks.innerHTML = state.players.length
    ? state.players.map(p => `
        <label class="check-label">
          <input type="checkbox" name="player" value="${p.id}">
          ${esc(p.name)}
        </label>`).join('')
    : '<span style="color:var(--text-dim);font-size:13px;font-style:italic">Adicione jogadores no painel admin primeiro.</span>';

  // Loot entries
  document.getElementById('loot-entries').innerHTML = '';

  // Special pts
  renderSpecialPts();

  if (bossId) {
    title.textContent = '✎ Editar Boss';
    const boss = state.bosses.find(b => b.id === bossId);
    document.getElementById('boss-date').value = boss.date;
    document.getElementById('boss-name').value = boss.name;
    document.getElementById('edit-boss-id').value = bossId;

    // Check players
    boss.players.forEach(pid => {
      const cb = checks.querySelector(`input[value="${pid}"]`);
      if (cb) cb.checked = true;
    });

    // Add loot
    boss.loot.forEach(l => addLootEntry(l.item, l.player));

    // Special pts
    if (boss.specialPts) {
      Object.entries(boss.specialPts).forEach(([pname, pts]) => {
        const sel = document.getElementById('spts-' + pname);
        if (sel) sel.value = pts;
      });
    }
  } else {
    title.textContent = '⚔ Registrar Boss';
    document.getElementById('boss-date').value = todayStr();
    document.getElementById('boss-name').value = '';
    document.getElementById('edit-boss-id').value = '';
  }

  openModal('boss-modal');
}

function renderSpecialPts() {
  const area = document.getElementById('special-pts-area');
  if (!state.players.length) {
    area.innerHTML = '<div style="color:var(--text-dim);font-size:12px;font-style:italic">Nenhum jogador cadastrado.</div>';
    return;
  }
  area.innerHTML = state.players.map(p => `
    <div class="field-row" style="margin-bottom:6px;align-items:center">
      <div style="flex:1;font-size:14px;color:var(--text)">${esc(p.name)}</div>
      <select id="spts-${esc(p.name)}" style="width:100px">
        <option value="0">— 0 pts</option>
        <option value="3">3 pts</option>
        <option value="5">5 pts</option>
        <option value="9">9 pts</option>
        <option value="13">13 pts</option>
        <option value="20">20 pts</option>
      </select>
    </div>`).join('');
}

function addLootEntry(item = '', playerName = '') {
  const container = document.getElementById('loot-entries');
  const id = uid();
  const div = document.createElement('div');
  div.className = 'loot-entry';
  div.id = 'le-' + id;

  const playerOptions = state.players.map(p =>
    `<option value="${esc(p.name)}" ${p.name === playerName ? 'selected' : ''}>${esc(p.name)}</option>`
  ).join('');

  div.innerHTML = `
    <select id="le-player-${id}">
      <option value="">— Jogador</option>
      ${playerOptions}
    </select>
    <input type="text" id="le-item-${id}" placeholder="Nome do item…" value="${esc(item)}" style="flex:1">
    <button class="remove-loot" onclick="document.getElementById('le-${id}').remove()">×</button>
  `;

  if (playerName) {
    div.querySelector('select').value = playerName;
  }

  container.appendChild(div);
}

function saveBoss() {
  const date = document.getElementById('boss-date').value;
  const name = document.getElementById('boss-name').value.trim();
  if (!date || !name) { toast('Preencha data e nome do boss.'); return; }

  // Collect players
  const players = [...document.querySelectorAll('#player-checks input:checked')].map(c => c.value);

  // Collect loot
  const lootEntries = document.querySelectorAll('.loot-entry');
  const loot = [];
  lootEntries.forEach(entry => {
    const id = entry.id.replace('le-', '');
    const player = document.getElementById('le-player-' + id)?.value || '';
    const item   = document.getElementById('le-item-' + id)?.value.trim() || '';
    if (item) loot.push({ item, player });
  });

  // Collect special pts
  const specialPts = {};
  state.players.forEach(p => {
    const sel = document.getElementById('spts-' + p.name);
    if (sel && parseInt(sel.value) > 0) specialPts[p.name] = parseInt(sel.value);
  });

  const editId = document.getElementById('edit-boss-id').value;
  if (editId) {
    const idx = state.bosses.findIndex(b => b.id === editId);
    state.bosses[idx] = { id: editId, date, name, players, loot, specialPts };
  } else {
    state.bosses.unshift({ id: uid(), date, name, players, loot, specialPts });
  }

  save();
  renderAll();
  closeModal('boss-modal');
  toast(editId ? 'Boss atualizado.' : 'Boss registrado.');
}

function deleteBoss(id) {
  if (!confirm('Remover este boss?')) return;
  state.bosses = state.bosses.filter(b => b.id !== id);
  save();
  renderAll();
  toast('Boss removido.');
}

// ────────────────────────────────────────────
// RENDER
// ────────────────────────────────────────────
function renderAll() {
  renderBossTable();
  renderSidePanel();
  if (isAdmin) renderAdmin();
}

function renderBossTable() {
  const tbody = document.getElementById('boss-tbody');
  const empty = document.getElementById('boss-empty');

  const sorted = [...state.bosses].sort((a,b) => b.date.localeCompare(a.date));

  if (!sorted.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }

  empty.style.display = 'none';

  tbody.innerHTML = sorted.map(boss => {
    const dateDisplay = formatDate(boss.date);

    const lootHtml = boss.loot.length
      ? `<span class="loot-tag">${boss.loot.map(l =>
          `<span class="loot-line">${l.player ? `<strong>${esc(l.player)}</strong> — ` : ''}${esc(l.item)}</span>`
        ).join('')}</span>`
      : `<span class="empty-cell">—</span>`;

    // Points per column
    const ptCols = [3,5,9,13,20].map(pts => {
      const winners = Object.entries(boss.specialPts || {})
        .filter(([,v]) => v === pts)
        .map(([k]) => k);
      return `<td class="points-cell pts-${pts}">${winners.length ? winners.map(w => `<span style="color:var(--gold)">${esc(w)}</span>`).join('<br>') : '<span class="empty-cell">—</span>'}</td>`;
    }).join('');

    const actionsHtml = isAdmin
      ? `<td class="action-cell" style="white-space:nowrap">
           <button class="btn" style="padding:3px 8px;font-size:9px;margin-right:4px" onclick="openBossModal('${boss.id}')">✎</button>
           <button class="btn btn-danger" style="padding:3px 8px;font-size:9px" onclick="deleteBoss('${boss.id}')">×</button>
         </td>`
      : `<td class="action-cell" style="display:none"></td>`;

    return `
      <tr>
        <td class="date">${dateDisplay}</td>
        <td class="boss-name">${esc(boss.name)}</td>
        <td>${lootHtml}</td>
        ${ptCols}
        ${actionsHtml}
      </tr>`;
  }).join('');
}

function renderSidePanel() {
  renderStacksTab();
  renderLootTab();
  renderPlayersTab();
}

function renderStacksTab() {
  const container = document.getElementById('stacks-list');

  // Calculate points per player
  const pts = {};
  state.players.forEach(p => pts[p.name] = 0);

  state.bosses.forEach(boss => {
    // Loot stacks
    boss.loot.forEach(l => {
      if (l.player && pts[l.player] !== undefined) {
        pts[l.player] += 1; // 1 stack per item received
      }
    });
    // Special pts
    Object.entries(boss.specialPts || {}).forEach(([pname, v]) => {
      if (pts[pname] !== undefined) pts[pname] += v;
    });
  });

  const sorted = Object.entries(pts).sort((a,b) => b[1]-a[1]);

  if (!sorted.length) {
    container.innerHTML = '<div class="empty-state">Nenhum dado ainda.</div>';
    return;
  }

  container.innerHTML = sorted.map(([name, p], i) => `
    <div class="player-row">
      <span class="player-rank">${i+1}</span>
      <span class="player-name">${esc(name)}</span>
      <span class="player-pts">${p}</span>
    </div>`).join('');
}

function renderLootTab() {
  const container = document.getElementById('loot-list');
  const allLoot = [];

  state.bosses.forEach(boss => {
    boss.loot.forEach(l => {
      allLoot.push({ ...l, boss: boss.name, date: boss.date });
    });
  });

  allLoot.sort((a,b) => b.date.localeCompare(a.date));

  if (!allLoot.length) {
    container.innerHTML = '<div class="empty-state">Nenhum loot registrado.</div>';
    return;
  }

  container.innerHTML = allLoot.map(l => `
    <div class="loot-item">
      <div class="loot-item-name">${esc(l.item)}</div>
      <div class="loot-item-meta">${l.player ? esc(l.player) + ' · ' : ''}${esc(l.boss)} · ${formatDate(l.date)}</div>
    </div>`).join('');
}

function renderPlayersTab() {
  const container = document.getElementById('players-list');

  if (!state.players.length) {
    container.innerHTML = '<div class="empty-state">Nenhum jogador cadastrado.</div>';
    return;
  }

  container.innerHTML = state.players.map(p => `
    <div class="player-badge">
      <div class="player-avatar">${p.name.charAt(0).toUpperCase()}</div>
      <span style="font-size:15px;color:var(--text)">${esc(p.name)}</span>
    </div>`).join('');
}

// ────────────────────────────────────────────
// VIEWS / TABS
// ────────────────────────────────────────────
function setView(view, btn) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setSideTab(tab, btn) {
  currentSideTab = tab;
  document.querySelectorAll('.side-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['stacks','loot','players'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
}

// ────────────────────────────────────────────
// ADMIN CLEAR
// ────────────────────────────────────────────
function clearAllData() {
  if (!confirm('Isso apagará TODOS os bosses e dados. Continuar?')) return;
  state = { bosses: [], players: state.players };
  save();
  renderAll();
  toast('Dados apagados.');
}

// ────────────────────────────────────────────
// MODAL HELPERS
// ────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ────────────────────────────────────────────
// UTILS
// ────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function formatDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────
load();
renderAll();
</script>
</body>
</html>
