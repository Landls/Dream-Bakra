<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TibiaZone | Rubinot Edition</title>
    <style>
        :root {
            --bg-body: #050505;
            --bg-card: #121212;
            --bg-input: #1a1a1a;
            --rubinot-red: #e63946; /* Vermelho Rubinot */
            --tibia-gold: #b9935a;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --border: #252525;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-body);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border-top: 4px solid var(--rubinot-red);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- LAYOUT PRINCIPAL --- */
        #app-content { display: none; width: 100%; max-width: 1100px; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        h1 { font-size: 1.5rem; letter-spacing: 2px; }
        h1 span { color: var(--rubinot-red); font-weight: bold; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        /* --- LOOT GRID (SANGUINE SET) --- */
        .loot-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
        }

        .loot-item {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .loot-item:hover { border-color: var(--rubinot-red); transform: translateY(-3px); }
        .loot-item img { width: 32px; height: 32px; image-rendering: pixelated; margin-bottom: 5px; }
        .loot-item span { display: block; font-size: 10px; color: var(--text-dim); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* --- INPUTS E BOTOES --- */
        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn {
            background: var(--rubinot-red);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { opacity: 0.8; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; font-size: 0.75rem; color: var(--text-dim); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }

        .badge { background: #1a1a1a; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:white">RUBINOT <span style="color:var(--rubinot-red)">ZONE</span></h2>
            <p style="color:var(--text-dim); font-size: 0.9rem;">Área Restrita - Insira a Chave</p>
            <input type="password" id="pass-input" placeholder="Senha do Time..." style="text-align: center; margin-bottom: 15px;">
            <button class="btn" onclick="checkPass()" style="width: 100%">ACESSAR PAINEL</button>
        </div>
    </div>

    <div id="app-content">
        <header>
            <h1>RUBINOT<span>ZONE</span></h1>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--text-dim); cursor:pointer">Logout</button>
        </header>

        <div class="main-grid">
            <div class="left-col">
                <div class="card">
                    <div class="card-title">Sanguine Set Drop List</div>
                    <div class="loot-container" id="loot-grid">
                        </div>
                </div>

                <div class="card">
                    <div class="card-title">Registrar Activity</div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="run-name" placeholder="Ex: Hunt Bakragore">
                        <input type="number" id="run-scrolls" placeholder="Scrolls">
                        <button class="btn" onclick="addRun()">SALVAR</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Histórico de Drops</div>
                    <table id="run-table">
                        <thead>
                            <tr>
                                <th>DATA</th>
                                <th>LOCAL</th>
                                <th>SCROLLS</th>
                                <th>STACKS</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="run-list"></tbody>
                    </table>
                </div>
            </div>

            <div class="right-col">
                <div class="card">
                    <div class="card-title">Profit Total</div>
                    <div id="total-stacks" style="font-size: 2rem; font-weight: bold; color: var(--rubinot-red)">0.0</div>
                    <div style="color: var(--text-dim); font-size: 0.8rem;">Stacks acumuladas</div>
                </div>

                <div class="card">
                    <div class="card-title">Dream Team</div>
                    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                        <input type="text" id="player-name" placeholder="Nick...">
                        <button class="btn" onclick="addPlayer()" style="padding: 10px;">+</button>
                    </div>
                    <div id="player-list" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SENHAS = ["dreamteam2026", "tibia123"];
        
        // Base de itens Sanguine do Wiki
        const SANGUINE_ITEMS = [
            { name: "Sanguine Blade", img: "https://www.tibiawiki.com.br/images/8/8a/Sanguine_Blade.gif" },
            { name: "Sanguine Axe", img: "https://www.tibiawiki.com.br/images/3/30/Sanguine_Axe.gif" },
            { name: "Sanguine Mace", img: "https://www.tibiawiki.com.br/images/e/e0/Sanguine_Mace.gif" },
            { name: "Sanguine Bow", img: "https://www.tibiawiki.com.br/images/6/60/Sanguine_Bow.gif" },
            { name: "Sanguine Rod", img: "https://www.tibiawiki.com.br/images/5/52/Sanguine_Rod.gif" },
            { name: "Sanguine Wand", img: "https://www.tibiawiki.com.br/images/d/df/Sanguine_Wand.gif" },
            { name: "Sanguine Cuirass", img: "https://www.tibiawiki.com.br/images/e/e7/Sanguine_Cuirass.gif" },
            { name: "Sanguine Legs", img: "https://www.tibiawiki.com.br/images/4/4b/Sanguine_Legs.gif" },
            { name: "Sanguine Boots", img: "https://www.tibiawiki.com.br/images/7/7b/Sanguine_Boots.gif" },
            { name: "Sanguine Mask", img: "https://www.tibiawiki.com.br/images/e/e0/Sanguine_Mask.gif" }
        ];

        let runs = JSON.parse(localStorage.getItem('rb_runs')) || [];
        let players = JSON.parse(localStorage.getItem('rb_players')) || [];

        function checkPass() {
            if (SENHAS.includes(document.getElementById('pass-input').value)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                renderAll();
            } else { alert("Acesso negado."); }
        }

        function initLoot() {
            const grid = document.getElementById('loot-grid');
            grid.innerHTML = SANGUINE_ITEMS.map(item => `
                <div class="loot-item" onclick="alert('Drop de ${item.name} registrado!')">
                    <img src="${item.img}" alt="${item.name}">
                    <span>${item.name.replace('Sanguine ', '')}</span>
                </div>
            `).join('');
        }

        function addRun() {
            const name = document.getElementById('run-name').value;
            const scrolls = document.getElementById('run-scrolls').value;
            if(!name || !scrolls) return;

            runs.push({
                id: Date.now(),
                date: new Date().toLocaleDateString('pt-BR'),
                name,
                scrolls: parseInt(scrolls),
                stacks: (parseInt(scrolls) / 10).toFixed(1)
            });
            save(); renderAll();
            document.getElementById('run-name').value = '';
            document.getElementById('run-scrolls').value = '';
        }

        function addPlayer() {
            const p = document.getElementById('player-name').value;
            if(p && !players.includes(p)) {
                players.push(p);
                save(); renderAll();
                document.getElementById('player-name').value = '';
            }
        }

        function removeRun(id) { runs = runs.filter(r => r.id !== id); save(); renderAll(); }
        function removePlayer(n) { players = players.filter(p => p !== n); save(); renderAll(); }
        function save() { 
            localStorage.setItem('rb_runs', JSON.stringify(runs)); 
            localStorage.setItem('rb_players', JSON.stringify(players)); 
        }

        function renderAll() {
            initLoot();
            const list = document.getElementById('run-list');
            list.innerHTML = runs.map(r => `
                <tr>
                    <td>${r.date}</td>
                    <td>${r.name}</td>
                    <td>${r.scrolls}</td>
                    <td style="color: var(--rubinot-red); font-weight:bold">${r.stacks}</td>
                    <td><button onclick="removeRun(${r.id})" style="background:none; border:none; color:#444; cursor:pointer">×</button></td>
                </tr>
            `).join('');

            const pList = document.getElementById('player-list');
            pList.innerHTML = players.map(p => `
                <div class="badge">${p} <span onclick="removePlayer('${p}')" style="margin-left:5px; cursor:pointer; color:var(--rubinot-red)">×</span></div>
            `).join('');

            const total = runs.reduce((acc, curr) => acc + parseFloat(curr.stacks), 0);
            document.getElementById('total-stacks').innerText = total.toFixed(1);
        }
    </script>
</body>
</html>
